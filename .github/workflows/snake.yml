name: generate contribution snake
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches: [ main ]
permissions:
  contents: write
jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: dikshant-agrawal
          outputs: |
            dist/snake.svg?palette=github-dark&color_dots=#0e1328,#00546b,#008db4,#00c4e0,#00e5ff&color_snake=#00e5ff
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
