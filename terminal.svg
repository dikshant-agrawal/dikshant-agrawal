<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 430" font-family="'JetBrains Mono','Fira Code',Consolas,monospace">
  <style>
    .lbl{fill:#00e5ff;font-size:13px}
    .val{fill:#e6f7ff;font-size:13px}
    .dim{fill:#6b7a8f;font-size:13px}
    .hd{fill:#00e5ff;font-size:13px;font-weight:bold}
    .cur{animation:blink 1s steps(1) infinite}
    @keyframes blink{50%{opacity:0}}
    .pulse{animation:pulse 2.4s infinite}
    @keyframes pulse{0%,100%{opacity:.25}50%{opacity:1}}
  </style>
  <rect width="920" height="430" rx="12" fill="#04060f" stroke="#00e5ff" stroke-opacity=".35"/>
  <!-- title bar -->
  <circle cx="24" cy="22" r="6" fill="#ff5f56"/><circle cx="44" cy="22" r="6" fill="#ffbd2e"/><circle cx="64" cy="22" r="6" fill="#27c93f"/>
  <text x="460" y="27" text-anchor="middle" class="dim">dikshant@embedded: ~/whoami</text>
  <line x1="0" y1="40" x2="920" y2="40" stroke="#00e5ff" stroke-opacity=".15"/>

  <!-- ===== left: live logic analyzer decoding UART ===== -->
  <defs>
    <clipPath id="lane"><rect x="0" y="-14" width="290" height="28"/></clipPath>
    <!-- one period of a clock: 40px -->
    <path id="clk" d="M0 8 h10 v-16 h10 v16 h10 v-16 h10 v16 h10 v-16 h10 v16 h10 v-16 h10 v16 h10 v-16 h10 v16 h10 v-16 h10 v16 h10 v-16 h10 v16 h10 v-16 h10 v16 h10 v-16 h10 v16 h10 v-16 h10 v16 h10 v-16 h10 v16 h10 v-16 h10 v16 h10 v-16 h10 v16 h10 v-16 h10 v16 h10" fill="none"/>
    <path id="tx" d="M0 8 h18 v-16 h34 v16 h12 h6 v-16 h22 v16 h28 v-16 h10 v16 h20 h14 v-16 h40 v16 h8 v-16 h16 v16 h30 v-16 h26 v16 h20 v-16 h12 v16 h24 v-16 h34 v16 h12 v-16 h22 v16 h28" fill="none"/>
    <path id="irq" d="M0 8 h64 v-16 h6 v16 h96 v-16 h6 v16 h58 v-16 h6 v16 h84 v-16 h6 v16 h74 v-16 h6 v16 h96" fill="none"/>
  </defs>
  <style>
    .scroll{animation:scroll 6s linear infinite}
    @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-200px)}}
    .ch{stroke:#00e5ff;stroke-width:1.6}
    .chdim{stroke:#00e5ff;stroke-width:1.6;stroke-opacity:.55}
    .lane-lbl{fill:#6b7a8f;font-size:9px;letter-spacing:1px}
    .byte{fill:#04060f;font-size:12px;font-weight:bold}
    .bytebox{fill:#00e5ff;rx:3}
    .b0{animation:pop 9s infinite}          .b1{animation:pop 9s infinite .55s}
    .b2{animation:pop 9s infinite 1.1s}     .b3{animation:pop 9s infinite 1.65s}
    .b4{animation:pop 9s infinite 2.2s}     .b5{animation:pop 9s infinite 2.75s}
    .b6{animation:pop 9s infinite 3.3s}     .b7{animation:pop 9s infinite 3.85s}
    .crc{animation:pop 9s infinite 4.6s}
    @keyframes pop{0%,4%{opacity:0}6%,88%{opacity:1}94%,100%{opacity:0}}
  </style>
  <g transform="translate(42,86)">
    <text x="0" y="-14" fill="#00e5ff" font-size="11" letter-spacing="2">// LOGIC.ANALYZER — UART0 @ 115200 8N1</text>
    <rect x="-12" y="-2" width="316" height="252" rx="8" fill="#060b18" stroke="#00e5ff" stroke-opacity=".25"/>

    <!-- CH0 CLK -->
    <text x="0" y="22" class="lane-lbl">CH0 · CLK</text>
    <g transform="translate(6,42)" clip-path="url(#lane)"><g class="scroll"><use href="#clk" class="chdim"/></g></g>

    <!-- CH1 TX -->
    <text x="0" y="74" class="lane-lbl">CH1 · TX</text>
    <g transform="translate(6,94)" clip-path="url(#lane)"><g class="scroll"><use href="#tx" class="ch"/></g></g>

    <!-- CH2 IRQ -->
    <text x="0" y="126" class="lane-lbl">CH2 · IRQ</text>
    <g transform="translate(6,146)" clip-path="url(#lane)"><g class="scroll"><use href="#irq" class="chdim"/></g></g>

    <!-- decode row -->
    <text x="0" y="182" class="lane-lbl">DECODE · ASCII</text>
    <g transform="translate(4,192)">
      <g class="b0"><rect class="bytebox" width="28" height="24"/><text x="14" y="17" text-anchor="middle" class="byte">D</text></g>
      <g class="b1" transform="translate(34,0)"><rect class="bytebox" width="28" height="24"/><text x="14" y="17" text-anchor="middle" class="byte">I</text></g>
      <g class="b2" transform="translate(68,0)"><rect class="bytebox" width="28" height="24"/><text x="14" y="17" text-anchor="middle" class="byte">K</text></g>
      <g class="b3" transform="translate(102,0)"><rect class="bytebox" width="28" height="24"/><text x="14" y="17" text-anchor="middle" class="byte">S</text></g>
      <g class="b4" transform="translate(136,0)"><rect class="bytebox" width="28" height="24"/><text x="14" y="17" text-anchor="middle" class="byte">H</text></g>
      <g class="b5" transform="translate(170,0)"><rect class="bytebox" width="28" height="24"/><text x="14" y="17" text-anchor="middle" class="byte">A</text></g>
      <g class="b6" transform="translate(204,0)"><rect class="bytebox" width="28" height="24"/><text x="14" y="17" text-anchor="middle" class="byte">N</text></g>
      <g class="b7" transform="translate(238,0)"><rect class="bytebox" width="28" height="24"/><text x="14" y="17" text-anchor="middle" class="byte">T</text></g>
    </g>
    <g class="crc"><text x="4" y="238" fill="#27c93f" font-size="11">✓ frame valid · payload: "DIKSHANT" · CRC OK</text></g>
  </g>

  <!-- ===== right: neofetch dump ===== -->
  <g transform="translate(400,78)">
    <text y="0"   class="hd">dikshant@embedded</text>
    <text y="14"  class="dim">─────────────────────────────────────────────</text>
    <text y="34"  class="lbl">Role:      <tspan class="val">Embedded Firmware Engineer (M.Sc. student)</tspan></text>
    <text y="54"  class="lbl">Host:      <tspan class="val">Hochschule Darmstadt · Embedded Systems</tspan></text>
    <text y="74"  class="lbl">Uptime:    <tspan class="val">3+ years industry firmware</tspan></text>
    <text y="94"  class="lbl">Kernel:    <tspan class="val">ErikaOS (OSEK) · FreeRTOS · bare-metal</tspan></text>
    <text y="114" class="lbl">CPU:       <tspan class="val">Cortex-M · PSoC5LP · STM32N6 · nRF52840 · ESP32</tspan></text>
    <text y="134" class="lbl">GPU:       <tspan class="val">Neural-ART NPU — runs Doom 🕹</tspan></text>
    <text y="154" class="lbl">Shell:     <tspan class="val">C · C++ · Python · SystemVerilog</tspan></text>
    <text y="174" class="lbl">Packages:  <tspan class="val">UART I2C SPI CAN BLE Zigbee LoRa MQTT</tspan></text>
    <text y="194" class="lbl">Hardware:  <tspan class="val">KiCad · 4-layer PCB · JTAG/SWD · scope</tspan></text>
    <text y="214" class="lbl">Languages: <tspan class="val">English C1 · Deutsch B1 · Hindi native</tspan></text>
    <text y="234" class="lbl">Seeking:   <tspan class="val">6-month embedded internship · Germany</tspan></text>
    <text y="254" class="dim">─────────────────────────────────────────────</text>
    <text y="274" class="lbl">Portfolio: <tspan class="val">dikshant-agrawal.github.io</tspan></text>
    <text y="294" class="lbl">Contact:   <tspan class="val">agrawaldikshant3001@gmail.com</tspan></text>
    <text y="322" class="hd">$ <tspan class="val">./explore --repos</tspan><tspan class="cur" fill="#00e5ff"> █</tspan></text>
  </g>
</svg>
