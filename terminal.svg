    <g transform="matrix(0.894,0.447,-0.894,0.447,170,120)" font-family="'JetBrains Mono',Consolas,monospace">
      <text x="0" y="-12" text-anchor="middle" fill="#e6f7ff" font-size="15" font-weight="bold" letter-spacing="1">DIKSHANT AGRAWAL</text>
