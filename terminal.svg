    <polygon points="170,186 50,126 50,150 170,210" fill="#03080f" stroke="#00e5ff" stroke-opacity=".35"/>
    <polygon points="170,66 290,126 170,186 50,126" fill="#0a1424" stroke="#00e5ff" stroke-opacity=".7" stroke-width="1.5"/>
