      <circle cx="223" cy="53" r="3.4"/><circle cx="95" cy="53" r="3.4"/>
      <circle cx="47" cy="74" r="3.4"/><circle cx="35" cy="81" r="3.4"/>
      <circle cx="279" cy="189" r="3.4"/><circle cx="267" cy="181" r="3.4"/>
      <circle cx="223" cy="211" r="3.4"/><circle cx="39" cy="189" r="3.4"/>
      <circle cx="51" cy="181" r="3.4"/><circle cx="95" cy="211" r="3.4"/>
    </g>

    <!-- leads (silver) -->
